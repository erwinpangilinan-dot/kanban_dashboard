name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kanban
          POSTGRES_PASSWORD: kanban
          POSTGRES_DB: mission_control
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kanban -d mission_control"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kanban:kanban@localhost:5432/mission_control

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            mcp/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Verify auth JWT helpers
        run: npm run verify:auth
        working-directory: backend

      - name: Verify notification helpers
        run: npm run verify:notify
        working-directory: backend

      - name: Verify GitHub helpers
        run: npm run verify:github
        working-directory: backend

      - name: Verify labels and export helpers
        run: npm run verify:labels
        working-directory: backend

      - name: Run database migrations
        run: npm run migrate
        working-directory: backend

      - name: API smoke test
        run: node scripts/ci-smoke.js

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Typecheck and build frontend
        run: npm run build
        working-directory: frontend

      - name: Install MCP dependencies
        run: npm ci
        working-directory: mcp

      - name: Verify MCP server
        run: node scripts/verify-mcp.js
        working-directory: mcp

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
