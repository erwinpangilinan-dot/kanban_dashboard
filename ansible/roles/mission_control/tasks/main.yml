---
- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
  when: ansible_os_family == "Debian"

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - git
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user != "root"

- name: Create install directory
  ansible.builtin.file:
    path: "{{ mc_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Clone or update application repository
  ansible.builtin.git:
    repo: "{{ mc_repo_url }}"
    dest: "{{ mc_install_dir }}"
    version: "{{ mc_deploy_ref }}"
    force: true
    accept_hostkey: true
  become: false

- name: Render production environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ mc_install_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Render production compose overlay
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ mc_install_dir }}/docker-compose.prod.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Render production nginx config
  ansible.builtin.template:
    src: nginx.prod.conf.j2
    dest: "{{ mc_install_dir }}/nginx.prod.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Ensure TLS certificate directory exists
  ansible.builtin.file:
    path: "{{ mc_install_dir }}/certs"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0750"
  when: mc_enable_tls

- name: Generate self-signed TLS certificate
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -days 825 -newkey rsa:2048
      -keyout {{ mc_install_dir }}/certs/privkey.pem
      -out {{ mc_install_dir }}/certs/fullchain.pem
      -subj /CN={{ mc_tls_cn }}
    creates: "{{ mc_install_dir }}/certs/fullchain.pem"
  when: mc_enable_tls

- name: Stop existing stack before rebuild
  ansible.builtin.command:
    cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans
    chdir: "{{ mc_install_dir }}"
  register: mc_compose_down
  changed_when: mc_compose_down.rc == 0
  failed_when: false

- name: Build and start Mission Control stack
  ansible.builtin.command:
    cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
    chdir: "{{ mc_install_dir }}"
  register: mc_compose_up
  changed_when: true

- name: Wait for API health check
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mc_app_port }}/api/health"
    status_code: 200
    return_content: true
  register: mc_health
  retries: 18
  delay: 5
  until: mc_health.status == 200

- name: Check GitHub integration status
  ansible.builtin.command:
    cmd: >-
      docker exec mission_control_api node -e
      "const ok=!!process.env.GITHUB_TOKEN&&!!process.env.GITHUB_DEFAULT_REPO;
      console.log(JSON.stringify({enabled:ok,default_repo:process.env.GITHUB_DEFAULT_REPO||''}));
      process.exit(ok?0:1)"
  register: mc_github_status
  changed_when: false
  when: mc_github_default_repo | length > 0

- name: Verify GitHub token loaded in API container
  ansible.builtin.assert:
    that:
      - mc_github_status.rc == 0
    fail_msg: >-
      GITHUB_TOKEN missing in the running API container.
      Ensure MC_GITHUB_TOKEN is set in production secrets and redeploy.
  when: mc_github_default_repo | length > 0

- name: Verify production ops status
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mc_app_port }}/api/ops/status"
    headers:
      Authorization: "Bearer {{ mc_auth_api_token }}"
    status_code: 200
    return_content: true
  register: mc_ops
  retries: 6
  delay: 5
  until: mc_ops.status == 200
  when: mc_auth_api_token | length > 0

- name: Assert production auth is enabled
  ansible.builtin.assert:
    that:
      - mc_ops.json.auth.enabled
      - mc_ops.json.auth.api_token_configured
      - mc_ops.json.auth.password_configured
    fail_msg: "Auth is not fully configured on the running API."
  when: mc_auth_api_token | length > 0

- name: Assert GitHub integration is ready
  ansible.builtin.assert:
    that:
      - mc_ops.json.github.enabled
      - mc_ops.json.github.webhook_configured
      - mc_ops.json.github.default_repo | length > 0
    fail_msg: "GitHub integration is not fully configured on the running API."
  when:
    - mc_auth_api_token | length > 0
    - mc_github_default_repo | length > 0

- name: Show deploy result
  ansible.builtin.debug:
    msg: >-
      Mission Control deployed at {{ mc_public_url }}
      — auth={{ mc_ops.json.auth.enabled | default('n/a') }},
      telegram={{ mc_ops.json.telegram.enabled | default('n/a') }},
      digest={{ mc_ops.json.email_digest.enabled | default('n/a') }},
      github={{ mc_ops.json.github.enabled | default('n/a') }},
      linked_issues={{ mc_ops.json.github.sync.linked_tasks | default('n/a') }}
