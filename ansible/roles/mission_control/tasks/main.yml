---
- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  when: ansible_os_family == "Debian"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
  when: ansible_os_family == "Debian"

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
      - git
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  when: ansible_user != "root"

- name: Create install directory
  ansible.builtin.file:
    path: "{{ mc_install_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Clone or update application repository
  ansible.builtin.git:
    repo: "{{ mc_repo_url }}"
    dest: "{{ mc_install_dir }}"
    version: "{{ mc_deploy_ref }}"
    force: true
    accept_hostkey: true
  become: false

- name: Render production environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ mc_install_dir }}/.env"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Render production compose overlay
  ansible.builtin.template:
    src: docker-compose.prod.yml.j2
    dest: "{{ mc_install_dir }}/docker-compose.prod.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

- name: Stop existing stack before rebuild
  ansible.builtin.command:
    cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans
    chdir: "{{ mc_install_dir }}"
  register: mc_compose_down
  changed_when: mc_compose_down.rc == 0
  failed_when: false

- name: Build and start Mission Control stack
  ansible.builtin.command:
    cmd: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
    chdir: "{{ mc_install_dir }}"
  register: mc_compose_up
  changed_when: true

- name: Wait for API health check
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ mc_app_port }}/api/health"
    status_code: 200
    return_content: true
  register: mc_health
  retries: 18
  delay: 5
  until: mc_health.status == 200

- name: Show deploy result
  ansible.builtin.debug:
    msg: "Mission Control deployed at http://{{ ansible_host }}:{{ mc_app_port }} — {{ mc_health.json }}"
