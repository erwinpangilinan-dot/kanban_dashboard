services:
  postgres:
    image: postgres:16-alpine
    container_name: mission_control_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: mission_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban -d mission_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mission_control_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kanban:kanban@postgres:5432/mission_control
      PORT: 3001
      NODE_ENV: production
      MIGRATIONS_DIR: /app/database/migrations
      JWT_SECRET: ${JWT_SECRET:-}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_API_TOKEN: ${AUTH_API_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      TELEGRAM_NOTIFY_ON: ${TELEGRAM_NOTIFY_ON:-completed,overdue,urgent}
      TELEGRAM_OVERDUE_CHECK_HOURS: ${TELEGRAM_OVERDUE_CHECK_HOURS:-24}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-mission-control@localhost}
      EMAIL_TO: ${EMAIL_TO:-}
      EMAIL_DIGEST_CRON: ${EMAIL_DIGEST_CRON:-0 8 * * 1-5}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      GOOGLE_SEND_AS: ${GOOGLE_SEND_AS:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_DEFAULT_REPO: ${GITHUB_DEFAULT_REPO:-}
      GITHUB_AUTO_CREATE: ${GITHUB_AUTO_CREATE:-true}
      MISSION_CONTROL_PUBLIC_URL: ${MISSION_CONTROL_PUBLIC_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mission_control_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
